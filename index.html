<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineVault | Gerenciador de Filmes</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <div class="container navbar">
            <a href="index.html" class="logo" aria-label="Início do CineVault">
                <i class="fa-solid fa-film text-gradient" aria-hidden="true"></i>
                CineVault
            </a>
            <div class="nav-actions">
                <div class="search-container">
                    <i class="fa-solid fa-search search-icon" aria-hidden="true"></i>
                    <input type="text" id="searchInput" placeholder="Buscar filmes..."
                        aria-label="Campo de busca de filmes">
                </div>
                <button class="btn btn-primary" id="addMovieBtn"
                    aria-label="Abrir formulário para adicionar novo filme">
                    <i class="fa-solid fa-plus" aria-hidden="true"></i> Adicionar Filme
                </button>
            </div>
        </div>
    </header>

    <main>
        <section class="hero" aria-labelledby="hero-title">
            <div class="container">
                <h1 id="hero-title">Sua Coleção Pessoal de <span class="text-gradient">Filmes</span></h1>
                <p>Acompanhe seus filmes favoritos num cofre premium. Clique em qualquer obra para ver os detalhes e
                    gerenciar suas avaliações (Reviews).</p>
                <div class="filters" id="filterContainer" role="group" aria-label="Filtros de status">
                    <button class="filter-btn active" data-filter="all" aria-pressed="true">Toda a Coleção</button>
                    <button class="filter-btn" data-filter="watched" aria-pressed="false">Assistidos</button>
                    <button class="filter-btn" data-filter="plan" aria-pressed="false">Quero Assistir</button>
                </div>
            </div>
        </section>

        <section class="container" aria-label="Lista de Filmes">
            <div class="carousel-wrapper">
                <button class="carousel-btn" id="prevBtn" aria-label="Mover carrossel para a esquerda"><i
                        class="fa-solid fa-chevron-left" aria-hidden="true"></i></button>
                <div class="movie-grid" id="movieGrid" role="list">
                    <!-- Os cartões de filmes serão renderizados aqui dinamicamente -->
                </div>
                <button class="carousel-btn" id="nextBtn" aria-label="Mover carrossel para a direita"><i
                        class="fa-solid fa-chevron-right" aria-hidden="true"></i></button>
            </div>
        </section>
    </main>

    <!-- Modal de Adicionar Filme -->
    <div class="modal-overlay" id="movieModal" role="dialog" aria-labelledby="modal-title" aria-modal="true">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title">Adicionar ao Cofre</h2>
                <button class="close-btn" id="closeModalBtn" aria-label="Fechar janela de cadastro"><i
                        class="fa-solid fa-xmark" aria-hidden="true"></i></button>
            </div>
            <form id="movieForm">
                <input type="hidden" id="movieId">
                <div class="form-grid">
                    <div class="input-group">
                        <label for="title">Título</label>
                        <input type="text" id="title" required placeholder="Ex: Interestelar" aria-required="true">
                    </div>
                    <div class="input-group">
                        <label for="genre">Gênero</label>
                        <input type="text" id="genre" required placeholder="Ex: Ficção Científica" aria-required="true">
                    </div>
                    <div class="input-group">
                        <label for="year">Ano</label>
                        <input type="number" id="year" required placeholder="2014" min="1800" max="2100" aria-required="true">
                    </div>
                    <div class="input-group">
                        <label for="status">Status</label>
                        <select id="status" required aria-required="true">
                            <option value="plan">Quero Assistir</option>
                            <option value="watched">Assistido</option>
                        </select>
                    </div>
                    <div class="input-group full-width">
                        <label for="posterUrl">URL do Pôster (Imagem)</label>
                        <input type="url" id="posterUrl" required placeholder="https://exemplo.com/poster.jpg" aria-required="true">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 5px;">
                    <i class="fa-solid fa-save" aria-hidden="true"></i> Salvar Filme
                </button>
            </form>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
