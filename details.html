<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Manager | Detalhes do Destino</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Pular para o conteúdo principal</a>
    
    <div id="sr-announcer" aria-live="polite" class="sr-only"></div>

    <header>
        <div class="container">
            <h1>🌍 Travel Manager</h1>
            <nav>
                <a href="index.html">Meus Destinos</a>
            </nav>
        </div>
    </header>

    <main id="main-content" class="container">
        <nav class="back-link" aria-label="Navegação secundária">
            <a href="index.html">&larr; Voltar para Destinos</a>
        </nav>

        <section id="destination-info" class="card hero-card" aria-label="Informações do Destino">
            <!-- JS will populate -->
        </section>

        <section class="expenses-section" aria-labelledby="expenses-title">
            <div class="expenses-header">
                <h2 id="expenses-title">Despesas da Viagem</h2>
                <button id="btn-add-expense" class="btn primary" aria-label="Adicionar nova despesa">Nova Despesa</button>
            </div>
            
            <div class="budget-progress" role="region" aria-label="Progresso do orçamento">
                <div class="progress-labels">
                    <span id="spent-label">Gasto: R$ 0,00</span>
                    <span id="budget-label">Orçamento: R$ 0,00</span>
                </div>
                <div class="progress-bar-container" aria-hidden="true">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
            </div>

            <ul id="expenses-list" class="list" aria-live="polite">
                <!-- JS will populate -->
            </ul>
        </section>
    </main>

    <!-- Modal for Adding/Editing Expense -->
    <div id="modal-expense" class="modal hidden" role="dialog" aria-labelledby="expense-modal-title" aria-modal="true">
        <div class="modal-content">
            <button class="close-btn" aria-label="Fechar janela">&times;</button>
            <h3 id="expense-modal-title">Adicionar Despesa</h3>
            <form id="form-expense">
                <input type="hidden" id="exp-id">
                
                <div class="form-group">
                    <label for="exp-desc">Descrição</label>
                    <input type="text" id="exp-desc" required placeholder="Ex: Jantar restaurante">
                </div>

                <div class="form-group">
                    <label for="exp-amount">Valor (R$)</label>
                    <input type="number" id="exp-amount" required min="0.01" step="0.01">
                </div>

                <div class="form-group">
                    <label for="exp-category">Categoria</label>
                    <select id="exp-category" required>
                        <option value="Alimentação">Alimentação</option>
                        <option value="Hospedagem">Hospedagem</option>
                        <option value="Transporte">Transporte</option>
                        <option value="Passeios">Passeios</option>
                        <option value="Outros">Outros</option>
                    </select>
                </div>

                <button type="submit" class="btn success" style="width: 100%; margin-top: 10px;">Salvar Despesa</button>
            </form>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/details.js"></script>
</body>
</html>
