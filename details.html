<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineVault | Detalhes do Filme</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container navbar">
            <a href="index.html" class="logo" aria-label="Início do CineVault">
                <i class="fa-solid fa-film text-gradient" aria-hidden="true"></i>
                CineVault
            </a>
            <a href="index.html" class="btn btn-secondary" aria-label="Voltar para a página principal">
                <i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Voltar ao Cofre
            </a>
        </div>
    </header>

    <main class="details-page-container">
        <section class="container split-layout" aria-label="Detalhes do Filme e Avaliação">
            
            <!-- Left Side: Movie Info -->
            <div class="movie-panel">
                <img src="" alt="Pôster do Filme" class="details-poster" id="detailsPoster">
                <div class="movie-panel-info">
                    <h1 class="details-title" id="detailsTitle">Carregando...</h1>
                    <div class="details-meta" aria-label="Metadados do filme">
                        <span id="detailsYear"><i class="fa-regular fa-calendar" aria-hidden="true"></i> ----</span>
                        <span id="detailsGenre"><i class="fa-solid fa-tag" aria-hidden="true"></i> ---</span>
                        <span id="detailsStatus" class="badge">---</span>
                    </div>
                    
                    <div class="action-buttons">
                        <button class="btn btn-secondary" id="editMovieBtn" aria-label="Editar informações do filme">
                            <i class="fa-solid fa-pen" aria-hidden="true"></i> Editar Filme
                        </button>
                        <button class="btn btn-danger" id="deleteMovieBtn" aria-label="Excluir filme do cofre">
                            <i class="fa-solid fa-trash" aria-hidden="true"></i> Excluir
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- Right Side: The Single Personal Review -->
            <div class="review-panel" aria-label="Sua avaliação pessoal">
                <div class="reviews-header">
                    <h2><i class="fa-solid fa-star text-gradient" aria-hidden="true"></i> Minha Avaliação</h2>
                </div>
                <div id="reviewContainer">
                    <!-- The single review or empty state will be loaded here -->
                </div>
            </div>
            
        </section>
    </main>

    <!-- Review Modal -->
    <div class="modal-overlay" id="reviewModal" role="dialog" aria-labelledby="review-modal-title" aria-modal="true">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="review-modal-title">Escrever uma Avaliação</h2>
                <button class="close-btn" id="closeReviewModal" aria-label="Fechar janela de avaliação"><i class="fa-solid fa-xmark" aria-hidden="true"></i></button>
            </div>
            <form id="reviewForm">
                <input type="hidden" id="reviewId">
                
                <div class="input-group">
                    <label for="rating">Nota (1 a 5 Estrelas)</label>
                    <select id="rating" required aria-required="true">
                        <option value="5">⭐⭐⭐⭐⭐ (5/5)</option>
                        <option value="4">⭐⭐⭐⭐ (4/5)</option>
                        <option value="3">⭐⭐⭐ (3/5)</option>
                        <option value="2">⭐⭐ (2/5)</option>
                        <option value="1">⭐ (1/5)</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label for="comment">Seus comentários</label>
                    <textarea id="comment" required rows="4" placeholder="O que você achou deste filme?" aria-required="true"></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
                    <i class="fa-solid fa-save" aria-hidden="true"></i> Salvar Avaliação
                </button>
            </form>
        </div>
    </div>
    
    <!-- Edit Movie Modal -->
    <div class="modal-overlay" id="movieModal" role="dialog" aria-labelledby="edit-modal-title" aria-modal="true">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="edit-modal-title">Editar Filme</h2>
                <button class="close-btn" id="closeMovieModalBtn" aria-label="Fechar edição de filme"><i class="fa-solid fa-xmark" aria-hidden="true"></i></button>
            </div>
            <form id="movieForm">
                <input type="hidden" id="movieId">
                
                <div class="input-group">
                    <label for="title">Título</label>
                    <input type="text" id="title" required aria-required="true">
                </div>
                
                <div class="input-group">
                    <label for="genre">Gênero</label>
                    <input type="text" id="genre" required aria-required="true">
                </div>
                
                <div class="input-group">
                    <label for="year">Ano de Lançamento</label>
                    <input type="number" id="year" required min="1800" max="2100" aria-required="true">
                </div>
                
                <div class="input-group">
                    <label for="posterUrl">URL do Pôster (Imagem)</label>
                    <input type="url" id="posterUrl" required aria-required="true">
                </div>
                
                <div class="input-group">
                    <label for="status">Status</label>
                    <select id="status" required aria-required="true">
                        <option value="plan">Quero Assistir</option>
                        <option value="watched">Assistido</option>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
                    <i class="fa-solid fa-save" aria-hidden="true"></i> Salvar Alterações
                </button>
            </form>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/details.js"></script>
</body>
</html>
